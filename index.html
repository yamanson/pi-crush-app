<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi-Crush Premium Elite</title>
    <!-- Pi Network SDK Library -->
    <script src="https://minepi.com"></script>
    <style>
        /* Cyberpunk Uzay Temalı Arka Plan */
        body { 
            background: radial-gradient(circle, #1a0033 0%, #0a001a 100%);
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 10px;
            overflow-x: hidden;
            user-select: none;
        }
        h1 {
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px #8a2be2, 0 0 20px #8a2be2;
            margin: 5px 0;
        }
        
        /* Kimlik Doğrulama Paneli */
        #auth-container { 
            margin: 0 auto 10px auto; 
            background: rgba(22, 33, 62, 0.7); 
            padding: 8px; 
            border-radius: 10px; 
            border: 1px solid #ffbe0b; 
            max-width: 380px;
            backdrop-filter: blur(5px);
        }
        #auth-status { font-size: 13px; color: #ffbe0b; font-weight: bold; }
        .btn-auth { background: #ffbe0b; color: #1a1a2e; border: none; padding: 6px 15px; font-size: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 5px; }

        /* Gelişmiş Skor ve Hamle Paneli */
        #stats-container { display: flex; justify-content: center; gap: 10px; font-size: 14px; font-weight: bold; margin-bottom: 10px; }
        .stat-box { 
            background: rgba(22, 33, 62, 0.8); 
            padding: 8px 12px; 
            border-radius: 8px; 
            border: 2px solid #e94560; 
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.3);
            min-width: 80px;
        }
        .stat-label { font-size: 10px; text-transform: uppercase; color: #aaa; margin-bottom: 2px; }
        .stat-val { font-size: 18px; color: #fff; text-shadow: 0 0 5px #fff; }

        /* Neon Parıltılı Oyun Tahtası */
        #board { 
            display: grid; 
            grid-template-columns: repeat(7, 50px); 
            grid-template-rows: repeat(7, 50px); 
            gap: 5px; 
            justify-content: center; 
            margin: 10px auto; 
            background-color: rgba(15, 52, 96, 0.4); 
            padding: 10px; 
            border-radius: 14px; 
            width: max-content; 
            border: 2px solid #30475e;
            box-shadow: 0 0 25px rgba(0,0,0,0.8);
            position: relative;
        }
        
        /* Kristal Tasarımlar */
        .tile { 
            width: 50px; 
            height: 50px; 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            transition: transform 0.1s ease; 
            box-sizing: border-box;
        }
        .tile:active { transform: scale(0.9); }
        
        .pi { background: linear-gradient(135deg, #b5179e, #7209b7); box-shadow: inset 0 0 8px #f72585, 0 0 8px rgba(181,23,158,0.5); }
        .pi::after { content: "π"; font-size: 24px; font-weight: bold; color: #fff; }
        
        .ai { background: linear-gradient(135deg, #ff4e00, #ec9f05); box-shadow: inset 0 0 8px #ffbe0b, 0 0 8px rgba(255,78,0,0.5); clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); }
        .ai::after { content: "AI"; font-size: 12px; font-weight: bold; color: #fff; }

        .block { background: linear-gradient(135deg, #00b4d8, #0077b6); box-shadow: inset 0 0 8px #90e0ef, 0 0 8px rgba(0,180,216,0.5); border-radius: 4px; }
        .block::after { content: "♦"; font-size: 22px; color: #fff; }

        .pick { background: linear-gradient(135deg, #00f5d4, #00bbf9); box-shadow: inset 0 0 8px #fff, 0 0 8px rgba(0,245,212,0.5); transform: rotate(45deg) scale(0.8); }
        
        .cloud { background: linear-gradient(135deg, #ff007f, #ff007f); box-shadow: inset 0 0 8px #fff, 0 0 8px rgba(255,0,127,0.5); border-radius: 50%; transform: scale(0.85); }
        .cloud::after { content: "★"; font-size: 18px; color: #fff; }

        .blank { background: transparent; box-shadow: none; }

        /* Fruity Pi Tarzı Reklam Destekli Joker Butonları */
        #joker-container { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .joker-box { 
            background: #16213e; border: 1px solid #30475e; padding: 5px 10px; border-radius: 8px; 
            font-size: 11px; cursor: pointer; text-align: center; width: 75px; position: relative;
        }
        .joker-box:active { transform: scale(0.95); background: #0f3460; }
        .joker-count { background: #32cd32; color: white; border-radius: 50%; width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; margin-left: 4px; }
        .joker-ad-icon { font-size: 9px; color: #ffbe0b; display: block; margin-top: 2px; }

        /* Combo Yazı Efekti */
        #combo-text { position: absolute; font-size: 24px; font-weight: bold; color: #ffbe0b; text-shadow: 0 0 10px #ff4e00; display: none; pointer-events: none; z-index: 50; animation: popUp 0.8s ease-out; }

        @keyframes popUp { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(1.3) translateY(-30px); opacity: 0; } }

        /* Modals */
        #game-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0f3460; padding: 25px; border-radius: 15px; border: 3px solid #ffbe0b; box-shadow: 0 0 30px rgba(0,0,0,0.9); z-index: 100; text-align: center; }
        .btn-game { background: #e94560; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 12px; }
    </style>
</head>
<body>
    <h1>Pi-Crush Elite</h1>
    
    <div id="auth-container">
        <div id="auth-status">Verifying connection with Pi Network...</div>
        <button id="login-btn" class="btn-auth" onclick="startPiAuth()">Force Connect Pi</button>
    </div>
    
    <div id="stats-container">
        <div class="stat-box"><div class="stat-label">Level</div><div class="stat-val" id="level-val">1</div></div>
        <div class="stat-box"><div class="stat-label">Moves</div><div class="stat-val" id="moves-val">20</div></div>
        <div class="stat-box"><div class="stat-label">Target</div><div class="stat-val" id="target-val">150</div></div>
        <div class="stat-box"><div class="stat-label">Score</div><div class="stat-val" id="score-val">0</div></div>
    </div>
    
    <div id="board">
        <div id="combo-text">COMBO!</div>
    </div>

    <!-- Joker Paneli -->
    <div id="joker-container">
        <div class="joker-box" onclick="useJoker('hammer')">
            <div>🔨 Hammer</div><span id="hammer-count" class="joker-count">1</span>
            <span class="joker-ad-icon">🎬 Refill</span>
        </div>
        <div class="joker-box" onclick="useJoker('bomb')">
            <div>💣 Bomb</div><span id="bomb-count" class="joker-count">1</span>
            <span class="joker-ad-icon">🎬 Refill</span>
        </div>
        <div class="joker-box" onclick="useJoker('shuffle')">
            <div>🔄 Shuffle</div><span id="shuffle-count" class="joker-count">1</span>
            <span class="joker-ad-icon">🎬 Refill</span>
        </div>
    </div>

    <div id="game-modal">
        <h2 id="modal-title">CONGRATULATIONS!</h2>
        <p id="modal-text">Level cleared successfully!</p>
        <button id="modal-btn" class="btn-game" onclick="closeModal()">Next Level</button>
    </div>

    <script>
        // Pi SDK & Auth
        async function initPi() {
            try {
                if (window.Pi) { await window.Pi.init({ version: "2.0", sandbox: true }); }
                startPiAuth();
            } catch (err) { console.error(err); }
        }

        async function startPiAuth() {
            const statusDiv = document.getElementById('auth-status');
            const loginBtn = document.getElementById('login-btn');
            try {
                if (window.Pi) {
                    const auth = await window.Pi.authenticate(['username'], onIncompletePaymentFound);
                    statusDiv.textContent = `Pilot Connected: ${auth.user.username}`;
                } else { statusDiv.textContent = "Pilot Connected: Pioneer_Developer"; }
                if(loginBtn) loginBtn.style.display = 'none';
            } catch (err) {
                statusDiv.textContent = "Pilot Connected: Pioneer_Developer";
                if(loginBtn) loginBtn.style.display = 'none';
            }
        }
        function onIncompletePaymentFound(payment) {}
        document.addEventListener("DOMContentLoaded", initPi);

        // --- GAME ENGINE ---
        const width = 7;
        const tileTypes = ['pi', 'ai', 'block', 'pick', 'cloud'];
        const board = document.getElementById('board');
        let score = 0, moves = 20, currentLevel = 1, targetScore = 150;
        let tiles = [], tileIdBeingDragged, tileIdBeingReplaced, gameActive = true;
        
        // Joker Envanteri
        let inventory = { hammer: 1, bomb: 1, shuffle: 1 };
        let activeJoker = null;

        function updateUI() {
            document.getElementById('score-val').textContent = score;
            document.getElementById('moves-val').textContent = moves;
            document.getElementById('level-val').textContent = currentLevel;
            document.getElementById('target-val').textContent = targetScore;
            document.getElementById('hammer-count').textContent = inventory.hammer;
