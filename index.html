<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi-Crush Premium Elite</title>
    <style>
        body { 
            background: radial-gradient(circle, #1a0033 0%, #0a001a 100%);
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 10px;
            user-select: none;
            overflow-x: hidden;
        }
        h1 {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px #8a2be2, 0 0 20px #8a2be2;
            margin: 5px 0;
        }
        
        #auth-container { 
            margin: 0 auto 10px auto; 
            background: rgba(22, 33, 62, 0.7); 
            padding: 8px; 
            border-radius: 10px; 
            border: 1px solid #ffbe0b; 
            max-width: 90%;
        }
        #auth-status { font-size: 13px; color: #ffbe0b; font-weight: bold; }

        #stats-container { display: flex; justify-content: center; gap: 5px; font-size: 12px; font-weight: bold; margin-bottom: 10px; width: 100%; max-width: 400px; margin-left: auto; margin-right: auto; }
        .stat-box { 
            background: rgba(22, 33, 62, 0.8); 
            padding: 6px 4px; 
            border-radius: 8px; 
            border: 2px solid #e94560; 
            flex: 1;
            min-width: 60px;
        }
        .stat-label { font-size: 9px; text-transform: uppercase; color: #aaa; margin-bottom: 2px; }
        .stat-val { font-size: 15px; color: #fff; }

        #board { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 4px; 
            justify-content: center; 
            margin: 10px auto; 
            background-color: rgba(15, 52, 96, 0.4); 
            padding: 8px; 
            border-radius: 14px; 
            width: 90vw; 
            max-width: 340px;
            aspect-ratio: 1 / 1;
            border: 2px solid #30475e;
            box-shadow: 0 0 25px rgba(0,0,0,0.8);
            box-sizing: border-box;
        }
        
        .tile { 
            width: 100%;
            height: 100%;
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            box-sizing: border-box;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            aspect-ratio: 1 / 1;
        }
        
        .tile.pi { background: linear-gradient(135deg, #b5179e, #7209b7) !important; box-shadow: inset 0 0 8px #f72585; }
        .tile.ai { background: linear-gradient(135deg, #ff4e00, #ec9f05) !important; box-shadow: inset 0 0 8px #ffbe0b; }
        .tile.block { background: linear-gradient(135deg, #00b4d8, #0077b6) !important; box-shadow: inset 0 0 8px #90e0ef; }
        .tile.pick { background: linear-gradient(135deg, #00f5d4, #00bbf9) !important; box-shadow: inset 0 0 8px #fff; }
        .tile.cloud { background: linear-gradient(135deg, #ff007f, #ff007f) !important; box-shadow: inset 0 0 8px #fff; border-radius: 50%; }
        .tile.blank { background: transparent !important; box-shadow: none !important; }

        #joker-container { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
        .joker-box { 
            background: #16213e; border: 1px solid #30475e; padding: 5px; border-radius: 8px; 
            font-size: 11px; cursor: pointer; text-align: center; flex: 1; max-width: 90px;
        }
        .joker-count { background: #32cd32; color: white; border-radius: 50%; width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; margin-left: 4px; }
        .joker-ad-icon { font-size: 9px; color: #ffbe0b; display: block; margin-top: 2px; }

        #game-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0f3460; padding: 25px; border-radius: 15px; border: 3px solid #ffbe0b; z-index: 100; text-align: center; }
        .btn-game { background: #e94560; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 12px; }
    </style>
</head>
<body>
    <h1>Pi-Crush Elite</h1>
    
    <div id="auth-container">
        <div id="auth-status">Pilot Connected: Pioneer_Developer</div>
    </div>
    
    <div id="stats-container">
        <div class="stat-box"><div class="stat-label">Level</div><div class="stat-val" id="level-val">1</div></div>
        <div class="stat-box"><div class="stat-label">Moves</div><div class="stat-val" id="moves-val">20</div></div>
        <div class="stat-box"><div class="stat-label">Target</div><div class="stat-val" id="target-val">150</div></div>
        <div class="stat-box"><div class="stat-label">Score</div><div class="stat-val" id="score-val">0</div></div>
    </div>
    
    <div id="board"></div>

    <div id="joker-container">
        <div class="joker-box" onclick="useJoker('hammer')">
            <div>🔨 Hammer</div><span id="hammer-count" class="joker-count">1</span>
            <span class="joker-ad-icon">🎬 Refill</span>
        </div>
        <div class="joker-box" onclick="useJoker('bomb')">
            <div>💣 Bomb</div><span id="bomb-count" class="joker-count">1</span>
            <span class="joker-ad-icon">🎬 Refill</span>
        </div>
        <div class="joker-box" onclick="useJoker('shuffle')">
            <div>🔄 Shuffle</div><span id="shuffle-count" class="joker-count">1</span>
            <span class="joker-ad-icon">🎬 Refill</span>
        </div>
    </div>

    <div id="game-modal">
        <h2 id="modal-title">CONGRATULATIONS!</h2>
        <p id="modal-text">Level cleared successfully!</p>
        <button id="modal-btn" class="btn-game" onclick="closeModal()">Next Level</button>
    </div>

    <script>
        // --- GAME ENGINE (RUNS INSTANTLY NO MATTER WHAT) ---
        const width = 7;
        const tileTypes = ['pi', 'ai', 'block', 'pick', 'cloud'];
        const emojis = { 'pi': 'π', 'ai': '🤖', 'block': '📦', 'pick': '⛏️', 'cloud': '☁️' };
        const board = document.getElementById('board');
        
        let score = 0, moves = 20, currentLevel = 1, targetScore = 150;
        let tiles = [], tileIdBeingDragged, tileIdBeingReplaced, gameActive = true;
        let inventory = { hammer: 1, bomb: 1, shuffle: 1 };
        let activeJoker = null;

        function updateUI() {
            document.getElementById('score-val').textContent = score;
            document.getElementById('moves-val').textContent = moves;
            document.getElementById('level-val').textContent = currentLevel;
            document.getElementById('target-val').textContent = targetScore;
            document.getElementById('hammer-count').textContent = inventory.hammer;
            document.getElementById('bomb-count').textContent = inventory.bomb;
            document.getElementById('shuffle-count').textContent = inventory.shuffle;
        }

        function createBoard() {
            board.innerHTML = "";
            tiles = [];
            for (let i = 0; i < width * width; i++) {
                const tile = document.createElement('div');
                const randomType = tileTypes[Math.floor(Math.random() * tileTypes.length)];
                tile.className = 'tile ' + randomType;
                tile.textContent = emojis[randomType];
                tile.setAttribute('draggable', true);
                tile.setAttribute('id', i);
                
                // Mouse Click Fallback for Desktop previews
                tile.addEventListener('click', function() {
                    if (activeJoker) { tileClick.call(this); }
                });

                tile.addEventListener('touchstart', touchStart, {passive: true});
                tile.addEventListener('touchmove', touchMove, {passive: false});
                tile.addEventListener('touchend', touchEnd);
                
                tile.addEventListener('dragstart', dragStart);
                tile.addEventListener('dragover', dragOver);
                tile.addEventListener('dragenter', dragEnter);
                tile.addEventListener('dragleave', dragLeave);
                tile.addEventListener('drop', dragDrop);
                tile.addEventListener('dragend', dragEnd);
                board.appendChild(tile);
                tiles.push(tile);
            }
            checkMatchesAndDrop();
        }

        // TOUCH CONTROLS
        let startX, startY, activeTouchTileId;
        function touchStart(e) {
            if(!gameActive || activeJoker) return;
            const touch = e.touches[0];
            startX = touch.clientX;
            startY = touch.clientY;
            activeTouchTileId = parseInt(this.id);
        }
        function touchMove(e) { e.preventDefault(); }
        function touchEnd(e) {
            if(!gameActive || activeJoker || activeTouchTileId === undefined) return;
            const touch = e.changedTouches[0];
            const diffX = touch.clientX - startX;
            const diffY = touch.clientY - startY;
            let targetId = -1;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 30 && activeTouchTileId % width < width - 1) targetId = activeTouchTileId + 1;
                else if (diffX < -30 && activeTouchTileId % width > 0) targetId = activeTouchTileId - 1;
            } else {
                if (diffY > 30 && activeTouchTileId < 42) targetId = activeTouchTileId + width;
                else if (diffY < -30 && activeTouchTileId >= width) targetId = activeTouchTileId - width;
            }

            if (targetId !== -1) {
                tileIdBeingDragged = activeTouchTileId;
