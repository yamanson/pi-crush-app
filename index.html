<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi-Crush Premium Elite</title>
    <!-- Resmi Kararlı Pi SDK -->
    <script src="https://minepi.com"></script>
    <style>
        body { 
            background: radial-gradient(circle, #1a0033 0%, #0a001a 100%);
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 10px;
            user-select: none;
        }
        h1 {
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px #8a2be2, 0 0 20px #8a2be2;
            margin: 5px 0;
        }
        
        #auth-container { 
            margin: 0 auto 10px auto; 
            background: rgba(22, 33, 62, 0.7); 
            padding: 8px; 
            border-radius: 10px; 
            border: 1px solid #ffbe0b; 
            max-width: 380px;
        }
        #auth-status { font-size: 13px; color: #ffbe0b; font-weight: bold; }
        .btn-auth { background: #ffbe0b; color: #1a1a2e; border: none; padding: 6px 15px; font-size: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 5px; }

        #stats-container { display: flex; justify-content: center; gap: 10px; font-size: 14px; font-weight: bold; margin-bottom: 10px; }
        .stat-box { 
            background: rgba(22, 33, 62, 0.8); 
            padding: 8px 12px; 
            border-radius: 8px; 
            border: 2px solid #e94560; 
            min-width: 80px;
        }
        .stat-label { font-size: 10px; text-transform: uppercase; color: #aaa; margin-bottom: 2px; }
        .stat-val { font-size: 18px; color: #fff; }

        #board { 
            display: grid; 
            grid-template-columns: repeat(7, 50px); 
            grid-template-rows: repeat(7, 50px); 
            gap: 5px; 
            justify-content: center; 
            margin: 15px auto; 
            background-color: rgba(15, 52, 96, 0.4); 
            padding: 10px; 
            border-radius: 14px; 
            width: max-content; 
            border: 2px solid #30475e;
            box-shadow: 0 0 25px rgba(0,0,0,0.8);
            min-height: 380px;
        }
        
        .tile { 
            width: 50px !important; 
            height: 50px !important; 
            border-radius: 8px; 
            display: flex !important; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            box-sizing: border-box;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }
        
        .tile.pi { background: linear-gradient(135deg, #b5179e, #7209b7) !important; box-shadow: inset 0 0 8px #f72585; }
        .tile.ai { background: linear-gradient(135deg, #ff4e00, #ec9f05) !important; box-shadow: inset 0 0 8px #ffbe0b; }
        .tile.block { background: linear-gradient(135deg, #00b4d8, #0077b6) !important; box-shadow: inset 0 0 8px #90e0ef; }
        .tile.pick { background: linear-gradient(135deg, #00f5d4, #00bbf9) !important; box-shadow: inset 0 0 8px #fff; }
        .tile.cloud { background: linear-gradient(135deg, #ff007f, #ff007f) !important; box-shadow: inset 0 0 8px #fff; border-radius: 50%; }
        .tile.blank { background: transparent !important; box-shadow: none !important; }

        #joker-container { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .joker-box { 
            background: #16213e; border: 1px solid #30475e; padding: 5px 10px; border-radius: 8px; 
            font-size: 11px; cursor: pointer; text-align: center; width: 75px;
        }
        .joker-count { background: #32cd32; color: white; border-radius: 50%; width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; margin-left: 4px; }
        .joker-ad-icon { font-size: 9px; color: #ffbe0b; display: block; margin-top: 2px; }

        #game-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0f3460; padding: 25px; border-radius: 15px; border: 3px solid #ffbe0b; z-index: 100; text-align: center; }
        .btn-game { background: #e94560; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 12px; }
    </style>
</head>
<body>
    <h1>Pi-Crush Elite</h1>
    
    <div id="auth-container">
        <div id="auth-status">Oyun Yükleniyor... / Game Loading...</div>
        <button id="login-btn" class="btn-auth" style="display:none;" onclick="startPiAuth()">Sign In with Pi Network</button>
    </div>
    
    <div id="stats-container">
        <div class="stat-box"><div class="stat-label">Level</div><div class="stat-val" id="level-val">1</div></div>
        <div class="stat-box"><div class="stat-label">Moves</div><div class="stat-val" id="moves-val">20</div></div>
        <div class="stat-box"><div class="stat-label">Target</div><div class="stat-val" id="target-val">150</div></div>
        <div class="stat-box"><div class="stat-label">Score</div><div class="stat-val" id="score-val">0</div></div>
    </div>
    
    <div id="board"></div>

    <div id="joker-container">
        <div class="joker-box" onclick="useJoker('hammer')">
            <div>🔨 Hammer</div><span id="hammer-count" class="joker-count">1</span>
            <span class="joker-ad-icon">🎬 Refill</span>
        </div>
        <div class="joker-box" onclick="useJoker('bomb')">
            <div>💣 Bomb</div><span id="bomb-count" class="joker-count">1</span>
            <span class="joker-ad-icon">🎬 Refill</span>
        </div>
        <div class="joker-box" onclick="useJoker('shuffle')">
            <div>🔄 Shuffle</div><span id="shuffle-count" class="joker-count">1</span>
            <span class="joker-ad-icon">🎬 Refill</span>
        </div>
    </div>

    <div id="game-modal">
        <h2 id="modal-title">CONGRATULATIONS!</h2>
        <p id="modal-text">Level cleared successfully!</p>
        <button id="modal-btn" class="btn-game" onclick="closeModal()">Next Level</button>
    </div>

    <script>
        // --- GERÇEK MOBİL PI BROWSER DOĞRULAMA KÖPRÜSÜ ---
        document.addEventListener("DOMContentLoaded", () => {
            // Önce oyun tahtasını koşulsuz şartsız hemen açıyoruz (Kilitlenmeyi önler)
            createBoard();
            updateUI();
            
            // Pi SDK'yı canlı (production) modda ayağa kaldırıyoruz
            setTimeout(async () => {
                const statusDiv = document.getElementById('auth-status');
                const loginBtn = document.getElementById('login-btn');
                
                if (window.Pi) {
                    try {
                        // SANDBOX TAMAMEN KALDIRILDI - DOĞRUDAN CANLI BAĞLANTI
                        await window.Pi.init({ version: "2.0" });
                        
                        window.Pi.authenticate(['username'], onIncompletePaymentFound)
                        .then(auth => {
                            statusDiv.textContent = "Welcome, " + auth.user.username;
                            if(loginBtn) loginBtn.style.display = 'none';
                        })
                        .catch(err => {
                            statusDiv.textContent = "Giriş Butonuna Basınız.";
                            if(loginBtn) loginBtn.style.display = 'inline-block';
                        });
                    } catch (e) {
                        statusDiv.textContent = "Connected (Local Mode)";
                    }
                } else {
                    statusDiv.textContent = "Connected (Local Mode)";
                }
            }, 500);
        });

        async function startPiAuth() {
            const statusDiv = document.getElementById('auth-status');
            const loginBtn = document.getElementById('login-btn');
            if (window.Pi) {
                try {
                    statusDiv.textContent = "Connecting...";
                    const auth = await window.Pi.authenticate(['username'], onIncompletePaymentFound);
                    statusDiv.textContent = "Welcome, " + auth.user.username;
                    if(loginBtn) loginBtn.style.display = 'none';
                } catch(e) {
                    statusDiv.textContent = "Connected (Local Mode)";
                    if(loginBtn) loginBtn.style.display = 'none';
                }
            }
        }

        function onIncompletePaymentFound(payment) {}

        // --- GAME ENGINE ---
        const width = 7;
        const tileTypes = ['pi', 'ai', 'block', 'pick', 'cloud'];
        const emojis = { 'pi': 'π', 'ai': '🤖', 'block': '📦', 'pick': '⛏️', 'cloud': '☁️' };
        const board = document.getElementById('board');
        
        let score = 0, moves = 20, currentLevel = 1, targetScore = 150;
        let tiles = [], tileIdBeingDragged, tileIdBeingReplaced, gameActive = true;
        let inventory = { hammer: 1, bomb: 1, shuffle: 1 };
        let activeJoker = null;

        function createBoard() {
            if(tiles.length > 0) return;
            board.innerHTML = "";
            tiles = [];
            for (let i = 0; i < width * width; i++) {
                const tile = document.createElement('div');
                const randomType = tileTypes[Math.floor(Math.random() * tileTypes.length)];
                tile.className = 'tile ' + randomType;
                tile.textContent = emojis[randomType];
                tile.setAttribute('draggable', true);
                tile.setAttribute('id', i);
                
                tile.addEventListener('dragstart', dragStart);
                tile.addEventListener('dragover', dragOver);
